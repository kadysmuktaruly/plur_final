<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Practice Leaderboard</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#020617;
}

.nav-link{
  color:white;
  text-decoration:none;
  margin-right:15px;
}

.nav-link.active{
  font-weight:bold;
}

button{
  padding:8px 16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.signout{
  background:#ef4444;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  padding:12px;
  border-bottom:1px solid #1e293b;
  text-align:center;
}

th{
  background:#1e293b;
}

.rank{
  font-weight:bold;
}

.gold{color:#facc15;}
.silver{color:#d1d5db;}
.bronze{color:#f97316;}
</style>
</head>

<body>

<header>
  <div>
    <a href="/app.html" class="nav-link">Practice</a>
    <a href="/leaderboard.html" class="nav-link active">Leaderboard</a>
  </div>

  <button class="signout" onclick="signOut()">Sign Out</button>
</header>

<div class="container">

<h1>Global Leaderboard</h1>

<table id="leaderboardTable">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
<th>Problems Solved</th>
</tr>
</thead>

<tbody id="leaderboardBody">
<tr>
<td colspan="4">Loading...</td>
</tr>
</tbody>

</table>

</div>

<script>

const token = localStorage.getItem("sat_token");
const user = JSON.parse(localStorage.getItem("sat_user") || "{}");

if (!token){
  window.location.href="/";
}

function authHeaders(){
  return{
    "Content-Type":"application/json",
    "Authorization":`Bearer ${token}`
  }
}

function signOut(){
  localStorage.removeItem("sat_token");
  localStorage.removeItem("sat_user");
  window.location.href="/";
}

async function loadLeaderboard(){

  try{

    const response = await fetch("/leaderboard/data",{
      headers:authHeaders()
    });

    if(!response.ok){
      signOut();
      return;
    }

    const data = await response.json();
    const body = document.getElementById("leaderboardBody");

    body.innerHTML="";

    data.forEach((player,index)=>{

      let rankClass="";
      if(index===0) rankClass="gold";
      if(index===1) rankClass="silver";
      if(index===2) rankClass="bronze";

      const row=`
      <tr>
        <td class="rank ${rankClass}">#${index+1}</td>
        <td>${player.name || "Anonymous"}</td>
        <td>${player.score || 0}</td>
        <td>${player.problems_solved || 0}</td>
      </tr>
      `;

      body.innerHTML+=row;

    });

  }catch(error){

    document.getElementById("leaderboardBody").innerHTML=
    "<tr><td colspan='4'>Failed to load leaderboard</td></tr>";

  }

}

loadLeaderboard();

</script>

</body>
</html>
