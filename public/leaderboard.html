<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAT Algebra Tutor — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root,     :root, [data-theme="dark"] {
      --bg: #080810;
      --surface: #0e0e1a;
      --surface2: #13131f;
      --border: #1c1c2e;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent-glow: rgba(99,102,241,0.25);
      --text: #eeedf5;
      --muted: #6b6880;
      --success: #22d3a5;
      --error: #f43f6e;
      --gold: #fbbf24;
      --nav-bg: rgba(8,8,16,0.9);
    }

        [data-theme="light"] {
      --bg: #f1f0f7;
      --surface: #ffffff;
      --surface2: #eceaf6;
      --border: #dddbe8;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent-glow: rgba(99,102,241,0.15);
      --text: #16151f;
      --muted: #7b7893;
      --success: #059669;
      --error: #e11d48;
      --gold: #d97706;
      --nav-bg: rgba(241,240,247,0.92);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(240,192,80,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.5rem; gap: 0.5rem;
    }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'Outfit', sans-serif; flex-shrink: 0; }
    .nav-dot { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: white; font-family: 'Outfit', sans-serif; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-link { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 0.4rem 0.6rem; border-radius: 6px; transition: all 0.15s; }
    .nav-link:hover { color: var(--text); background: var(--surface); }
    .nav-link.active { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .btn-signout { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-signout:hover { border-color: var(--error); color: var(--error); }
    .theme-btn-nav { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; transition: all 0.15s; }
    .theme-btn-nav:hover { border-color: var(--accent); }
    /* Hamburger */
    .nav-burger { display: none; flex-direction: column; justify-content: center; align-items: stretch; gap: 5px; width: 34px; height: 34px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; padding: 8px 7px; flex-shrink: 0; transition: border-color 0.15s; box-sizing: border-box; }
    .nav-burger:hover { border-color: var(--accent); }
    .nav-burger span { display: block; width: 100%; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.25s; flex-shrink: 0; }
    .nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    /* Drawer */
    .nav-drawer { display: none; position: fixed; top: 53px; left: 0; right: 0; z-index: 199; background: var(--nav-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem 1.25rem; flex-direction: column; gap: 0.25rem; animation: drawerIn 0.2s ease; }
    .nav-drawer.open { display: flex; }
    @keyframes drawerIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .drawer-link { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 0.75rem 0.85rem; border-radius: 8px; transition: all 0.15s; }
    .drawer-link:hover { color: var(--text); background: var(--surface); }
    .drawer-link.active { color: var(--accent); background: rgba(99,102,241,0.07); }
    .drawer-divider { height: 1px; background: var(--border); margin: 0.5rem 0; }
    .drawer-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.25rem; }
    .drawer-signout { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.45rem 0.9rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .drawer-signout:hover { border-color: var(--error); color: var(--error); }
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-right { display: none; }
      .nav-burger { display: flex; }
    }

    .page { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem; }

    @media (max-width: 600px) {
      .page { padding: 1.25rem 0.85rem; }
    }

    .page-header { margin-bottom: 2rem; }
    .page-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .page-title { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: -0.04em; text-transform: uppercase; }

    /* Top 3 podium */
    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 400px) {
      .podium { grid-template-columns: 1fr; gap: 0.5rem; }
      .podium-item { display: flex; align-items: center; gap: 0.75rem; text-align: left; padding: 0.9rem 1rem; }
      .podium-medal { margin-bottom: 0; font-size: 1.2rem; }
      .podium-score { font-size: 1.2rem; }
    }

    .podium-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .podium-item.rank-1 { border-color: rgba(240,192,80,0.4); background: rgba(240,192,80,0.04); }
    .podium-item.rank-2 { border-color: rgba(160,174,192,0.3); }
    .podium-item.rank-3 { border-color: rgba(200,121,65,0.3); }

    .podium-medal { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .podium-name { font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-score { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .podium-item.rank-1 .podium-score { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .podium-item.rank-2 .podium-score { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .podium-item.rank-3 .podium-score { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .podium-acc { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.05em; color: var(--muted); margin-top: 0.2rem; }

    /* Table */
    .lb-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }

    .lb-header { display: grid; grid-template-columns: 2.5rem 1fr 6rem 6rem 5rem; padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

    .lb-row {
      display: grid;
      grid-template-columns: 2.5rem 1fr 6rem 6rem 5rem;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.15s;
    }

    @media (max-width: 500px) {
      .lb-header { grid-template-columns: 2rem 1fr 4.5rem 4.5rem; padding: 0.6rem 1rem; }
      .lb-header > div:nth-child(4) { display: none; }
      .lb-row { grid-template-columns: 2rem 1fr 4.5rem 4.5rem; padding: 0.75rem 1rem; }
      .lb-row > div:nth-child(4) { display: none; }
      .lb-val { font-size: 0.78rem; }
      .lb-name { font-size: 0.82rem; }
    }

    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--surface2); }
    .lb-row.me { background: rgba(124,106,255,0.06); }

    .lb-rank { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--muted); font-weight: 500; }
    .lb-name { font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 600; }
    .lb-name .you-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--accent); background: rgba(124,106,255,0.15); padding: 0.1rem 0.4rem; border-radius: 4px; margin-left: 0.5rem; }
    .lb-val { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; text-align: right; }
    .lb-correct { color: var(--success); }
    .lb-pct { color: var(--muted); font-size: 0.8rem; }

    /* Loading */
    .loader-wrap { text-align: center; padding: 3rem; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .empty { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--muted); text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo"><div class="nav-dot">S</div>PLUR Tutor</div>
    <div class="nav-links">
      <a href="/app" class="nav-link">Practice</a>
      <a href="/leaderboard" class="nav-link active">Leaderboard</a>
      <a href="/history-page" class="nav-link">History</a>
    </div>
    <div class="nav-right" style="display:flex;align-items:center;gap:0.6rem">
      <button class="theme-btn-nav" id="themeBtn" onclick="toggleTheme()">🌙</button>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
    <button class="nav-burger" id="navBurger" onclick="toggleDrawer()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-drawer" id="navDrawer">
    <a href="/app" class="drawer-link">Practice</a>
    <a href="/leaderboard" class="drawer-link active">Leaderboard</a>
    <a href="/history-page" class="drawer-link">History</a>
    <div class="drawer-divider"></div>
    <div class="drawer-row">
      <button class="theme-btn-nav" id="drawerThemeBtn" onclick="toggleTheme()">🌙</button>
      <button class="drawer-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="page">
    <div class="page-header">
      <div class="page-eyebrow">Top Performers</div>
      <div class="page-title">Leaderboard</div>
    </div>

    <div id="podium" class="podium" style="display:none"></div>

    <div class="lb-card" id="lbCard">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div class="loader-txt">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('sat_token');
    const user = JSON.parse(localStorage.getItem('sat_user') || '{}');
    if (!token) { window.location.replace('/'); throw new Error('redirect'); }

    function signOut() {
      localStorage.removeItem('sat_token');
      localStorage.removeItem('sat_user');
      window.location.href = '/';
    }

    const medals = ['🥇','🥈','🥉'];
    const rankClasses = ['rank-1','rank-2','rank-3'];

    async function loadLeaderboard() {
      try {
        const res = await fetch('/leaderboard/data', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { signOut(); return; }
        const data = await res.json();
        const lb = data.leaderboard || [];

        // Podium (top 3)
        const podiumEl = document.getElementById('podium');
        if (lb.length >= 3) {
          podiumEl.style.display = 'grid';
          podiumEl.innerHTML = lb.slice(0, 3).map((u, i) => {
            const pct = u.total_attempted > 0 ? Math.round((u.total_correct / u.total_attempted) * 100) : 0;
            return `
              <div class="podium-item ${rankClasses[i]}">
                <div class="podium-medal">${medals[i]}</div>
                <div class="podium-name">${u.username}</div>
                <div class="podium-score">${u.total_correct}</div>
                <div class="podium-acc">${pct}% acc · ${u.total_attempted} tried</div>
              </div>`;
          }).join('');
        }

        // Full table (rank 4+)
        const card = document.getElementById('lbCard');
        if (lb.length === 0) {
          card.innerHTML = '<div class="empty">No data yet — be the first to practice!</div>';
          return;
        }

        card.innerHTML = `
          <div class="lb-header">
            <div>#</div><div>Player</div><div style="text-align:right">Correct</div><div style="text-align:right">Attempted</div><div style="text-align:right">Accuracy</div>
          </div>
          ${lb.map((u, i) => {
            const pct = u.total_attempted > 0 ? Math.round((u.total_correct / u.total_attempted) * 100) : 0;
            const isMe = u.username === user.username;
            return `
              <div class="lb-row${isMe ? ' me' : ''}">
                <div class="lb-rank">${i + 1}</div>
                <div class="lb-name">${u.username}${isMe ? '<span class="you-tag">you</span>' : ''}</div>
                <div class="lb-val lb-correct">${u.total_correct}</div>
                <div class="lb-val">${u.total_attempted}</div>
                <div class="lb-val lb-pct">${pct}%</div>
              </div>`;
          }).join('')}
        `;
      } catch (e) {
        document.getElementById('lbCard').innerHTML = `<div class="empty">Failed to load: ${e.message}</div>`;
      }
    }

    // Theme
    const savedTheme = localStorage.getItem('sat_theme') || 'dark';
    applyTheme(savedTheme);
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      const icon = t === 'dark' ? '🌙' : '☀️';
      document.getElementById('themeBtn').textContent = icon;
      const dt = document.getElementById('drawerThemeBtn');
      if (dt) dt.textContent = icon;
      localStorage.setItem('sat_theme', t);
    }
    function toggleTheme() {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
    function toggleDrawer() {
      document.getElementById('navBurger').classList.toggle('open');
      document.getElementById('navDrawer').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      const drawer = document.getElementById('navDrawer');
      const burger = document.getElementById('navBurger');
      if (drawer.classList.contains('open') && !drawer.contains(e.target) && !burger.contains(e.target)) {
        drawer.classList.remove('open'); burger.classList.remove('open');
      }
    });

    loadLeaderboard();
  </script>
</body>
</html>
