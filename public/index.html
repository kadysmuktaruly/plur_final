<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAT Algebra Tutor — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,0.25);
      --text: #e8e6f0;
      --muted: #6b6880;
      --success: #3ecf8e;
      --error: #ff4d6d;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
    }

    /* animated bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(62,207,142,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 14px;
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 1rem;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .logo p {
      font-family: 'Inconsolata', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* Form */
    .form { display: none; flex-direction: column; gap: 1rem; }
    .form.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-family: 'Inconsolata', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Buttons */
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.8rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.25rem;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:hover:not(:disabled) {
      background: #6a58f0;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: 'Inconsolata', monospace;
      margin: 0.25rem 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-google:hover {
      border-color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    /* Messages */
    .msg {
      font-family: 'Inconsolata', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      display: none;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    .msg.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--error); display: block; }
    .msg.success { background: rgba(62,207,142,0.1); border: 1px solid rgba(62,207,142,0.3); color: var(--success); display: block; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div class="container">
      <div class="logo">
        <div class="logo-mark">S</div>
        <h1>SAT Algebra Tutor</h1>
        <p>AI-powered practice</p>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('signin')">Sign In</button>
          <button class="tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Sign In -->
        <div class="form active" id="signinForm">
          <div class="field">
            <label>Email</label>
            <input type="email" id="siEmail" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="siPassword" placeholder="••••••••" />
          </div>
          <div class="msg" id="siMsg"></div>
          <button class="btn-primary" id="siBtn" onclick="signIn()">Sign In</button>
          <div class="divider">or</div>
          <button class="btn-google" onclick="googleAuth()">
            <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
        </div>

        <!-- Sign Up -->
        <div class="form" id="signupForm">
          <div class="field">
            <label>Username</label>
            <input type="text" id="suUsername" placeholder="mathwiz42" />
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="suEmail" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="suPassword" placeholder="min 6 characters" />
          </div>
          <div class="msg" id="suMsg"></div>
          <button class="btn-primary" id="suBtn" onclick="signUp()">Create Account</button>
          <div class="divider">or</div>
          <button class="btn-google" onclick="googleAuth()">
            <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // If already logged in, redirect
    if (localStorage.getItem('sat_token')) window.location.href = '/app';

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'signin')));
      document.getElementById('signinForm').classList.toggle('active', tab === 'signin');
      document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
    }

    async function signIn() {
      const email = document.getElementById('siEmail').value.trim();
      const password = document.getElementById('siPassword').value;
      if (!email || !password) return showMsg('siMsg', 'Please fill in all fields.', 'error');

      const btn = document.getElementById('siBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/auth/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Sign in failed');

        localStorage.setItem('sat_token', data.access_token);
        localStorage.setItem('sat_user', JSON.stringify(data.user));
        window.location.href = '/app';
      } catch (e) {
        showMsg('siMsg', e.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function signUp() {
      const username = document.getElementById('suUsername').value.trim();
      const email = document.getElementById('suEmail').value.trim();
      const password = document.getElementById('suPassword').value;
      if (!username || !email || !password) return showMsg('suMsg', 'Please fill in all fields.', 'error');
      if (password.length < 6) return showMsg('suMsg', 'Password must be at least 6 characters.', 'error');

      const btn = document.getElementById('suBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';

      try {
        const res = await fetch('/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, username })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Sign up failed');

        if (data.access_token) {
          localStorage.setItem('sat_token', data.access_token);
          localStorage.setItem('sat_user', JSON.stringify(data.user));
          window.location.href = '/app';
        } else {
          showMsg('suMsg', 'Check your email to confirm your account, then sign in.', 'success');
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      } catch (e) {
        showMsg('suMsg', e.message, 'error');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    function googleAuth() {
      // Supabase Google OAuth — redirect to backend which redirects to Supabase
      window.location.href = '/auth/google';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('signinForm').classList.contains('active')) signIn();
        else signUp();
      }
    });
  </script>
</body>
</html>
